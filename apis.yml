aid: ebpf
name: eBPF
description: >-
  eBPF (extended Berkeley Packet Filter) is a technology that allows programs to run
  in a sandboxed virtual machine within the Linux kernel without changing kernel source
  code or loading kernel modules. It enables high-performance networking, security
  monitoring, observability, and tracing capabilities at the operating system level
  with minimal overhead. eBPF is governed as a standard by the eBPF Foundation under
  the Linux Foundation.
